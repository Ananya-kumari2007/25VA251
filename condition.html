    <script>
        //Conditional statements in JavaScript control the flow of a program by,

    let age =23;

         console.log("eligibe for vote casting");

         }
         //switch statement:The JavaScript switch statement is a control flow structure used to perform
         //  different actions based on different values of a single expression.
         let grade =50;
         switch(grade){
            case 'A':result="first division";
            break;
            case'B' : result="second devision";
            break;
            case'C' : result="third division";
            break;
            default: result="fail"
         }
         
         //The else if statement in JavaScript is used to specify a new condition to test 
         // if the previous condition in an if or another else if statement is false. It allows
         //  for chaining multiple conditions sequentially to control the flow of a program.

         let marks = 32;
         if ( marks= 33){
            console.log("grade third");

         }
         else if (marks > 33 && marks < 60){
            console.log("grade second");

         }
         else{
            console.log("grade first");
         }
