<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
     
    let studentlist=["vivek","vinnay","rahul","abhi"];
    //for loop....
    for(let i=0;i<studentlist.length;i++){
        console.log(studentlist[i]);
    }
     //while loop...
     let i=0;
     while(i<studentlist.length){
        console.log(studentlist[i]);
        i++;
     }
     //The for...of loop in JavaScript provides a simple, modern syntax for iterating 
     // directly over the values of iterable objects such as Arrays, Strings, Maps, and Sets. 
     for(let x of studentlist){
        console.log(x);
     }
     //The JavaScript for...in loop is used to iterate over the enumerable properties 
     // (keys) of an object. It is primarily designed for objects and is not generally recommended for use with arrays
     
    </script>
</body>
</html>
