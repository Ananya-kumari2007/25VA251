    <script>
     //object in js: collection(pair)of  keys (properties) and its value
     //create an object using literal key...

     let student={
        name:"ananya",
        age:25,
        ismarried : false,
        address:{
            streetno:23,
            area:"indrapuram",
            city:"GZB",
            pincode:201009
        },
        course:"B.Tech",
        branch:"CSE",
        year:2025,
        getinfo:function(){
            return " my education is"+student.course;
        },
     };
     //access object's keys or properties
     console.log(student.address.pincode);//object
     console.log(student.getinfo());//function
     console.log(student)
     console.log(typeof (student));
     //find any key in your object

     console.log(student);

     console.log(keyslength.length);
